# Based on the workflow by by BrandonP from https://github.com/mikemorran/hubs/blob/master/.github/workflows/ce-build.yml

name: custom-docker-build-push

on:
  workflow_dispatch:
    inputs:
      Regsitry_Base_URL:
        type: string
      Registry_Username:
        type: string
      Registry_Password:
        type: string
      Registry_Namespace:
        type: string
      Image_Tag:
        type: string
      Dockerfile:
        type: string
      codePath:
        type: string

# Add in default values for the inputs plus define any missing variables we need.
# Everything should take their values from env rather than inputs.
env:
  Regsitry_Base_URL: ${{ inputs.Regsitry_Base_URL || vars.REGSITRY_BASE_URL }}
  Registry_Username: ${{ inputs.Registry_Username || secrets.REGISTRY_USERNAME }}
  Registry_Password: ${{ inputs.Registry_Password || secrets.REGISTRY_PASSWORD }}
  Registry_Namespace: ${{ inputs.Registry_Namespace || vars.REGISTRY_NAMESPACE }}
  Image_Tag: ${{ inputs.Image_Tag || github.ref_name }}
  Dockerfile: ${{ inputs.Dockerfile || 'RetPageOriginDockerfile' }}
  codePath: ${{ inputs.codePath }}
# repo_name: ${GITHUB_REPOSITORY#*/} This must be added in each job that needs it because parameter expansion isn't supported here.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Update env variables
        run: |
          echo "repo_name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          install: true
      - name: Login to container registry
        uses: docker/login-action@v1
        with:
          registry: ${{ env.Regsitry_Base_URL }}
          username: ${{ env.Registry_Username }}
          password: ${{ env.Registry_Password }}

      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          path: "./repo"

      - name: Use codePath for multirepo
        if: ${{ env.codePath != ''}}
        run: |
          mkdir ./_repo
          cp -rf ./repo/${{ env.codePath }}/* ./_repo
          rm -rf ./repo
          mv ./_repo ./repo
          ls ./repo

      - name: Docker Buildx setup
        uses: docker/setup-buildx-action@v1
        with:
          install: true

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: repo/
          file: repo/${{ env.Dockerfile }}
          tags: ${{ env.Regsitry_Base_URL }}/${{ env.Registry_Namespace }}/${{ env.repo_name }}:${{ env.Image_Tag }},${{ env.Regsitry_Base_URL }}/${{ env.Registry_Namespace }}/${{ env.repo_name }}:custom-${{ github.run_number }}
          cache-from: type=registry,ref=${{ env.Regsitry_Base_URL }}/${{ env.Registry_Namespace }}/${{ env.repo_name }}:buildcache
          cache-to: type=registry,ref=${{ env.Regsitry_Base_URL }}/${{ env.Registry_Namespace }}/${{ env.repo_name }}:buildcache,mode=max
          push: true
